services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iksanpass-app
    network_mode: host
    env_file:
      - .env
    environment:
      PORT: ${DOCKER_APP_PORT:-3001}
      DB_HOST: 127.0.0.1
    init: true
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/api/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
