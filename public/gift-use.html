<!--
  파일: public/gift-use.html
  목적: 선물 사용 화면 — 패스 1개 정보 보여주고 사용 처리
  왜: 받은 패스를 버스 탑승·검표 시 QR로 제시하고 사용 완료 처리하는 화면
  주요: 패스 정보, QR 표시, 사용 완료 처리 버튼
-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>패스 사용 - 익산 환승패스</title>
  <script src="js/bootstrap.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 상단 헤더 -->
  <header class="top-header">
    <button class="icon-btn" id="back-btn" aria-label="뒤로가기">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <h1>패스 사용</h1>
    <div style="width: 20px;"></div>
  </header>

  <main class="gift-use-page">

    <!-- 패스 정보 -->
    <section class="gift-use-card">
      <img id="gift-product-image" src="img/iksan-logo.svg" alt="패스 이미지">
      <p class="order-brand" id="gift-brand">익산 교통</p>
      <p class="product-name" id="gift-product-name">패스 정보를 불러오는 중입니다.</p>

      <!-- 바코드 영역 -->
      <div class="qr-box">
        <img
          class="barcode-image"
          id="gift-qr-image"
          src="/images/barcodes/default-barcode.png"
          alt="테스트용 익산 환승패스 바코드"
        >
        <p class="qr-number" id="gift-barcode">-</p>
        <p class="qr-guide" id="gift-status-guide">버스 탑승 시 이 화면을 단말기에 제시하세요</p>
      </div>
    </section>

  </main>

  <!-- 하단 사용 완료 버튼 -->
  <footer class="bottom-bar">
    <button class="btn-primary" id="use-complete-btn">사용 완료 처리</button>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/gift-use.js?v=20260715-barcode"></script>
</body>
</html>
