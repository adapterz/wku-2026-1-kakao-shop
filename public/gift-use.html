<!--
  파일: public/gift-use.html
  목적: 선물 사용 화면 — 선물 1개 정보 보여주고 사용 처리
  왜: 받은 선물을 실제로 사용(바코드 제시)하는 화면
  주요: 선물 정보, 바코드 표시, 사용 완료 버튼
-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>선물 사용 - 선물하기</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 상단 헤더 -->
  <header class="top-header">
    <button class="icon-btn" onclick="history.back()">←</button>
    <h1>선물 사용</h1>
    <div style="width: 20px;"></div>
  </header>

  <main class="gift-use-page">

    <!-- 선물 정보 -->
    <section class="gift-use-summary">
      <img src="img/pass1.jpg" alt="익산역-시내 환승 1일권">
      <p class="product-name">익산역-시내 환승 1일권</p>
      <p class="gift-sender">김철수님이 보낸 선물</p>
    </section>

    <!-- 바코드 영역 -->
    <section class="barcode-box">
      <div class="barcode-image">||||| |||| | ||||| ||| |||||</div>
      <p class="barcode-number">1234 5678 9012 3456</p>
      <p class="barcode-guide">매장 또는 승차 시 이 화면을 제시하세요</p>
    </section>

  </main>

  <!-- 하단 사용 완료 버튼 -->
  <footer class="bottom-bar">
    <button class="btn-primary" id="use-btn">사용 완료 처리</button>
  </footer>

</body>
</html>
