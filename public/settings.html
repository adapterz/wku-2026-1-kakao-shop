<!--
  파일: public/settings.html
  목적: 세부 제어 설정 화면
  왜: 다크모드, 푸시 알림, 결제 수단, 회원 정보 수정을 관리하기 위한 세부 폼을 제공하기 위함
  주요: 다크모드/알림 토글, 통합 정보 수정 폼, 결제수단 퀵 매핑, 로그아웃, 하단 동일 탭바
-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>설정 - 익산 환승패스</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 상단 헤더 (뒤로가기, 타이틀) -->
  <header class="top-header settings-top-header">
    <button class="icon-btn" id="settings-back-btn" type="button" aria-label="프로필로 뒤로가기">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6"/>
      </svg>
    </button>
    <h1>설정</h1>
    <span class="header-spacer" aria-hidden="true"></span>
  </header>

  <main class="settings-page">
    <!-- 1. 앱 기능 설정 (토글 스위치) -->
    <section class="profile-settings-group" aria-label="앱 기능 설정">
      <h3 class="settings-group-title">앱 설정</h3>
      <div class="settings-card">
        <div class="settings-row">
          <span class="settings-label-group">
            <svg class="settings-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
            </svg>
            <span>다크 모드 활성화</span>
          </span>
          <label class="toggle-switch" aria-label="다크 모드 토글">
            <input type="checkbox" id="dark-mode-toggle">
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="settings-row">
          <span class="settings-label-group">
            <svg class="settings-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
            </svg>
            <span>혜택 및 선물 알림 설정</span>
          </span>
          <label class="toggle-switch" aria-label="알림 수신 토글">
            <input type="checkbox" id="notification-toggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </section>

    <!-- 2. 개인 정보 및 결제 폼 -->
    <section id="info-form-section" class="profile-settings-group" aria-label="개인 정보 설정">
      <h3 class="settings-group-title">개인 정보 수정</h3>
      <div class="settings-card info-form-card">
        <div class="info-input-group">
          <label for="settings-edit-username">닉네임</label>
          <input type="text" id="settings-edit-username" class="info-input" placeholder="이름을 입력하세요">
        </div>

        <div class="info-input-group">
          <label for="settings-edit-email">가입 이메일</label>
          <input type="email" id="settings-edit-email" class="info-input disabled-style" disabled>
        </div>

        <div class="info-input-group">
          <label for="settings-edit-phone">휴대폰 번호</label>
          <input type="tel" id="settings-edit-phone" class="info-input" placeholder="010-0000-0000">
        </div>

        <!-- 결제수단 바로가기 단추 -->
        <button id="settings-payment-btn" class="profile-form-action-btn" type="button">
          <span class="btn-label-group">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/>
            </svg>
            <span>결제 수단 관리</span>
          </span>
          <span class="action-status-label" id="settings-payment-status-text">등록 안 됨 ></span>
        </button>

        <button id="settings-save-changes-btn" class="profile-submit-btn" type="button">변경사항 저장</button>
      </div>
    </section>

    <!-- 3. 하단 계정 관리 작업 -->
    <section class="profile-actions-section" aria-label="계정 관리 작업">
      <button id="settings-logout-btn" class="profile-logout-btn" type="button">로그아웃</button>
      <button class="profile-withdraw-btn" type="button" disabled>회원 탈퇴 (준비 중)</button>
    </section>
  </main>

  <!-- 하단 고정 탭바 -->
  <footer class="bottom-tabbar">
    <button class="tabbar-item" id="settings-home-btn" type="button">
      <span class="tabbar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="m3 10.5 9-7 9 7"/><path d="M5 9.5V20h14V9.5"/><path d="M10 20v-5h4v5"/>
        </svg>
      </span>
      <span class="tabbar-label">홈</span>
    </button>
    <button class="tabbar-item" id="settings-pass-btn" type="button">
      <span class="tabbar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9V7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2a2.5 2.5 0 0 0 0 5v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2a2.5 2.5 0 0 0 0-5Z"/><path d="M14 5v2.5"/><path d="M14 11v2"/><path d="M14 16.5V19"/>
        </svg>
      </span>
      <span class="tabbar-label">패스</span>
    </button>
    <button class="tabbar-item" id="settings-giftbox-btn" type="button">
      <span class="tabbar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12v8a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-8"/><path d="M3 7h18v5H3z"/><path d="M12 7v14"/><path d="M12 7s-1.5-4-4.2-4C5.6 3 4.8 4.6 5.6 5.9 6.4 7.2 12 7 12 7Z"/><path d="M12 7s1.5-4 4.2-4c2.2 0 3 1.6 2.2 2.9C17.6 7.2 12 7 12 7Z"/>
        </svg>
      </span>
      <span class="tabbar-label">선물함</span>
    </button>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
