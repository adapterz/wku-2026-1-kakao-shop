<!--
  파일: public/profile.html
  목적: 사용자 프로필 메인 화면 (마이페이지)
  왜: 사용자 요약 정보와 활동 배지 컬렉션을 시각적으로 돋보이게 렌더링하기 위함
  주요: 사용자 프로필 요약, 활동 배지, 패스 이용 현황, 최근 패스 내역, 설정 라우팅, 하단 탭바
-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이 프로필 - 익산 환승패스</title>
  <script src="js/bootstrap.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 상단 헤더 (뒤로가기, 타이틀, 설정 이동 톱니바퀴) -->
  <header class="top-header profile-top-header">
    <button class="icon-btn" id="profile-back-btn" type="button" aria-label="뒤로가기">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6"/>
      </svg>
    </button>
    <h1>프로필</h1>
    <button class="icon-btn" id="profile-settings-btn" type="button" aria-label="설정 화면 이동">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <main class="profile-page">
    <!-- 1. 상단 프로필 카드 정보 영역 -->
    <section class="profile-card-section" aria-label="프로필 요약">
      <div class="profile-avatar-wrapper">
        <img id="profile-avatar" src="img/default-profile.png" alt="사용자 프로필 이미지">
        <span class="profile-avatar-active-dot" aria-hidden="true"></span>
      </div>

      <div class="profile-name-container">
        <span id="profile-username-title" class="profile-username">마룡이</span>
        <span class="profile-verified-badge" aria-label="인증된 사용자">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
          </svg>
        </span>
      </div>
      <p id="profile-email-subtitle" class="profile-email-text">guest@maryong.com</p>

      <!-- 🎖️ 나의 획득 배지 영역 (그리드 형태) -->
      <div class="profile-badges-container">
        <div class="badge-header-group">
          <h3 class="badge-title">나의 활동 배지</h3>
          <div class="profile-streak-badge" aria-label="연속 7일 이용 중">
            <svg class="streak-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
            </svg>
            <span>🔥 7일째</span>
          </div>
        </div>
        <div class="badge-grid">
          <div class="badge-item active" title="기본 이동 패서 - 기본 이동 패스 1회 이상 이용">
            <div class="badge-icon">🏅</div>
            <span class="badge-label">이동패서</span>
          </div>
          <div class="badge-item active" title="환승의 달인 - 환승 광역 패스를 성공적으로 연계 이용">
            <div class="badge-icon">🔄</div>
            <span class="badge-label">환승달인</span>
          </div>
          <div class="badge-item locked" title="잠겨있음 - 관광 특수 패스를 끊고 익산 명소에 방문하세요">
            <div class="badge-icon">
              <span>🗺️</span>
              <div class="lock-overlay">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </div>
            </div>
            <span class="badge-label">익산탐험</span>
          </div>
        </div>
      </div>
    </section>

    <!-- 2. 실제 선물함 데이터를 활용한 패스 이용 현황 -->
    <section class="profile-content-section" aria-labelledby="profile-stats-title">
      <div class="profile-section-header">
        <h2 id="profile-stats-title">패스 이용 현황</h2>
      </div>
      <div class="profile-stats-grid" aria-live="polite">
        <div class="profile-stat-item">
          <strong id="profile-unused-count">-</strong>
          <span>보유 패스</span>
        </div>
        <div class="profile-stat-item">
          <strong id="profile-used-count">-</strong>
          <span>사용 완료</span>
        </div>
        <div class="profile-stat-item">
          <strong id="profile-total-count">-</strong>
          <span>받은 선물</span>
        </div>
      </div>
    </section>

    <!-- 3. 최근 받은·사용한 패스 -->
    <section class="profile-content-section" aria-labelledby="profile-recent-title">
      <div class="profile-section-header">
        <h2 id="profile-recent-title">최근 패스</h2>
        <button id="profile-all-gifts-btn" type="button">전체보기</button>
      </div>
      <div id="profile-recent-list" class="profile-recent-list" aria-live="polite">
        <p class="loading-message">최근 패스를 불러오는 중입니다.</p>
      </div>
    </section>

  </main>

  <!-- 하단 고정 탭바 -->
  <footer class="bottom-tabbar">
    <button class="tabbar-item" id="profile-home-btn" type="button">
      <span class="tabbar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="m3 10.5 9-7 9 7"/><path d="M5 9.5V20h14V9.5"/><path d="M10 20v-5h4v5"/>
        </svg>
      </span>
      <span class="tabbar-label">홈</span>
    </button>
    <button class="tabbar-item" id="profile-pass-btn" type="button">
      <span class="tabbar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9V7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2a2.5 2.5 0 0 0 0 5v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2a2.5 2.5 0 0 0 0-5Z"/><path d="M14 5v2.5"/><path d="M14 11v2"/><path d="M14 16.5V19"/>
        </svg>
      </span>
      <span class="tabbar-label">패스</span>
    </button>
    <button class="tabbar-item" id="profile-giftbox-btn" type="button">
      <span class="tabbar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12v8a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-8"/><path d="M3 7h18v5H3z"/><path d="M12 7v14"/><path d="M12 7s-1.5-4-4.2-4C5.6 3 4.8 4.6 5.6 5.9 6.4 7.2 12 7 12 7Z"/><path d="M12 7s1.5-4 4.2-4c2.2 0 3 1.6 2.2 2.9C17.6 7.2 12 7 12 7Z"/>
        </svg>
      </span>
      <span class="tabbar-label">선물함</span>
    </button>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
