<!--
  파일: public/passes.html
  목적: 전체 패스 상품 목록 화면
  왜: 홈의 추천 상품과 분리해 사용자가 판매 중인 모든 패스를 한 화면에서 확인하도록 함
  주요: 전체 상품 API 조회, 티켓형 상품 카드, 하단 탭바
-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전체 패스 - 익산 환승패스</title>
  <script src="js/bootstrap.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="top-header passes-top-header">
    <button class="icon-btn" id="passes-back-btn" type="button" aria-label="뒤로가기">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6"/>
      </svg>
    </button>
    <h1>전체 패스</h1>
    <a class="icon-btn" href="search.html" aria-label="상품 검색">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"/><path d="m20 20-3.8-3.8"/>
      </svg>
    </a>
  </header>

  <main class="passes-page">
    <section class="passes-intro" aria-labelledby="passes-title">
      <div>
        <p class="passes-eyebrow">익산 이동을 한 번에</p>
        <h2 id="passes-title">필요한 환승패스를 선택하세요</h2>
      </div>
      <span id="passes-count" class="passes-count" aria-live="polite"></span>
    </section>

    <div class="passes-filter" role="group" aria-label="패스 카테고리 필터">
      <button class="passes-filter-btn active" type="button" data-category="" aria-pressed="true">전체</button>
      <button class="passes-filter-btn" type="button" data-category="basic" aria-pressed="false">기본 이동</button>
      <button class="passes-filter-btn" type="button" data-category="transfer" aria-pressed="false">환승·광역</button>
      <button class="passes-filter-btn" type="button" data-category="special" aria-pressed="false">관광·특수</button>
    </div>

    <section class="passes-slider-container" aria-label="패스 상품 목록 슬라이더">
      <div id="passes-slider" class="passes-slider">
        <!-- 전체 탭 슬라이드 -->
        <div class="passes-slide" data-index="0" data-category="">
          <div id="passes-list-all" class="pass-list">
            <p class="loading-message">전체 패스를 불러오는 중입니다.</p>
          </div>
        </div>
        <!-- 기본 이동 탭 슬라이드 -->
        <div class="passes-slide" data-index="1" data-category="basic">
          <div id="passes-list-basic" class="pass-list">
            <p class="loading-message">기본 이동 패스를 불러오는 중입니다.</p>
          </div>
        </div>
        <!-- 환승·광역 탭 슬라이드 -->
        <div class="passes-slide" data-index="2" data-category="transfer">
          <div id="passes-list-transfer" class="pass-list">
            <p class="loading-message">환승·광역 패스를 불러오는 중입니다.</p>
          </div>
        </div>
        <!-- 관광·특수 탭 슬라이드 -->
        <div class="passes-slide" data-index="3" data-category="special">
          <div id="passes-list-special" class="pass-list">
            <p class="loading-message">관광·특수 패스를 불러오는 중입니다.</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="bottom-tabbar">
    <button class="tabbar-item" id="passes-home-btn" type="button">
      <span class="tabbar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="m3 10.5 9-7 9 7"/><path d="M5 9.5V20h14V9.5"/><path d="M10 20v-5h4v5"/>
        </svg>
      </span>
      <span class="tabbar-label">홈</span>
    </button>
    <button class="tabbar-item active" type="button" aria-current="page">
      <span class="tabbar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9V7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2a2.5 2.5 0 0 0 0 5v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2a2.5 2.5 0 0 0 0-5Z"/><path d="M14 5v2.5"/><path d="M14 11v2"/><path d="M14 16.5V19"/>
        </svg>
      </span>
      <span class="tabbar-label">패스</span>
    </button>
    <button class="tabbar-item" id="passes-giftbox-btn" type="button">
      <span class="tabbar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12v8a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-8"/><path d="M3 7h18v5H3z"/><path d="M12 7v14"/><path d="M12 7s-1.5-4-4.2-4C5.6 3 4.8 4.6 5.6 5.9 6.4 7.2 12 7 12 7Z"/><path d="M12 7s1.5-4 4.2-4c2.2 0 3 1.6 2.2 2.9C17.6 7.2 12 7 12 7Z"/>
        </svg>
      </span>
      <span class="tabbar-label">선물함</span>
    </button>
  </footer>

  <script src="js/api.js?v=20260715-gift-cache"></script>
  <script src="js/components.js"></script>
  <script src="js/passes.js"></script>
</body>
</html>
