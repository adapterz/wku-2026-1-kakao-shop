<!--
  파일: public/signup.html
  목적: 회원가입 화면 — 회원가입 처리
  왜: 신규 사용자가 계정을 생성할 수 있게 하는 화면
  주요: 이메일/비밀번호/이름 입력, 회원가입 버튼
-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 - 선물하기</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="auth-page">
    <h1 class="auth-title">회원가입</h1>

    <form class="auth-form">
      <input type="text" id="signup-name" class="text-input" placeholder="이름">
      <input type="email" id="signup-email" class="text-input" placeholder="이메일">
      <input type="password" id="signup-password" class="text-input" placeholder="비밀번호">
      <button type="button" class="btn-primary" id="signup-btn">회원가입</button>
    </form>

    <p class="auth-link">
      이미 계정이 있으신가요?
      <a href="login.html">로그인</a>
    </p>
  </main>

</body>
</html>
