<!--
  파일: public/giftbox.html
  목적: 선물함 화면 — 받은 선물(환승패스) 목록 보여주기
  왜: 사용자가 받은 패스를 미사용/사용완료로 구분해서 확인하는 화면
  주요: 미사용/사용완료 탭, 패스 목록
-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>선물함 - 익산 환승패스</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 상단 헤더 -->
  <header class="top-header">
    <button class="icon-btn" id="back-btn">←</button>
    <h1>선물함</h1>
    <button class="icon-btn">🔍</button>
  </header>

  <!-- 미사용/사용완료 탭 -->
  <nav class="giftbox-tab">
    <button class="giftbox-tab-btn active" id="tab-unused">미사용 선물</button>
    <button class="giftbox-tab-btn" id="tab-used">사용완료</button>
  </nav>

  <!-- 선물 목록 -->
  <main class="gift-list" id="gift-list">
    <p class="loading-message">선물함을 불러오는 중입니다.</p>
  </main>

  <!-- 하단 고정 탭바 -->
  <footer class="bottom-tabbar">
    <button class="tabbar-item" id="tabbar-home-btn">
      <span class="tabbar-icon">🏠</span>
      <span class="tabbar-label">홈</span>
    </button>
    <button class="tabbar-item">
      <span class="tabbar-icon">📋</span>
      <span class="tabbar-label">패스</span>
    </button>
    <button class="tabbar-item active">
      <span class="tabbar-icon">👤</span>
      <span class="tabbar-label">선물함</span>
    </button>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/giftbox.js"></script>
</body>
</html>
