<!--
  파일: public/giftbox.html
  목적: 선물함 화면 — 받은 선물(환승패스) 목록 보여주기
  왜: 사용자가 받은 패스를 미사용/사용완료로 구분해서 확인하는 화면
  주요: 미사용/사용완료 탭, 패스 목록
-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 패스 - 익산 환승패스</title>
  <script src="js/bootstrap.js"></script>
  <link rel="stylesheet" href="css/style.css?v=20260715-used-pass">
</head>
<body>

  <!-- 상단 헤더 -->
  <header class="top-header">
    <button class="icon-btn" id="back-btn" aria-label="뒤로가기">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <h1>내 패스</h1>
    <a class="icon-btn" href="search.html" aria-label="상품 검색">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.8-3.8"/></svg>
    </a>
  </header>

  <!-- 미사용/사용완료 탭 -->
  <nav class="giftbox-tab">
    <button class="giftbox-tab-btn active" id="tab-unused">미사용 패스</button>
    <button class="giftbox-tab-btn" id="tab-used">사용완료</button>
  </nav>

  <!-- 선물 목록 -->
  <main class="gift-list" id="gift-list">
    <p class="loading-message">내 패스를 불러오는 중입니다.</p>
  </main>

  <!-- 하단 고정 탭바 -->
  <footer class="bottom-tabbar">
    <button class="tabbar-item" id="tabbar-home-btn">
      <span class="tabbar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="m3 10.5 9-7 9 7"/><path d="M5 9.5V20h14V9.5"/><path d="M10 20v-5h4v5"/>
        </svg>
      </span>
      <span class="tabbar-label">홈</span>
    </button>
    <button class="tabbar-item" id="tabbar-pass-btn" type="button">
      <span class="tabbar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9V7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2a2.5 2.5 0 0 0 0 5v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2a2.5 2.5 0 0 0 0-5Z"/><path d="M14 5v2.5"/><path d="M14 11v2"/><path d="M14 16.5V19"/>
        </svg>
      </span>
      <span class="tabbar-label">패스</span>
    </button>
    <button class="tabbar-item active">
      <span class="tabbar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12v8a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-8"/><path d="M3 7h18v5H3z"/><path d="M12 7v14"/><path d="M12 7s-1.5-4-4.2-4C5.6 3 4.8 4.6 5.6 5.9 6.4 7.2 12 7 12 7Z"/><path d="M12 7s1.5-4 4.2-4c2.2 0 3 1.6 2.2 2.9C17.6 7.2 12 7 12 7Z"/>
        </svg>
      </span>
      <span class="tabbar-label">내 패스</span>
    </button>
  </footer>

  <script src="js/api.js?v=20260715-gift-cache"></script>
  <script src="js/pass-visual.js"></script>
  <script src="js/giftbox.js?v=20260715-used-pass"></script>
</body>
</html>
